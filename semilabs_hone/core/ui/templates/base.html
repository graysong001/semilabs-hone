<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}semilabs-hone{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="container-fluid">
    <ul>
      <li><a href="/" class="logo"><strong>semilabs-hone</strong></a></li>
    </ul>
    <ul class="nav-tabs">
      {% set mods = get_modules() %}
      {% for mid, mod in mods.items() %}
      <li><a href="/{{ mid }}" class="nav-tab">{{ mod.name }}</a></li>
      {% endfor %}
    </ul>
    <ul>
      <li>
        <span id="ws-status" class="ws-indicator" title="WebSocket 连接状态">
          <span class="ws-dot"></span> WS
        </span>
      </li>
    </ul>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
