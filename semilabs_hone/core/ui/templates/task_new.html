{% extends "base.html" %}
{% block title %}Skim - 新建任务{% endblock %}

{% block content %}
<h2>新建采集任务</h2>

{# 共享创建任务 dialog (T39): 局部 _task_new_dialog.html 含表单/校验/二次确认/提交逻辑 #}
{% include "_task_new_dialog.html" %}

<div id="task-result" class="task-result"></div>
{% endblock %}

{% block scripts %}
<script>
// 独立 /tasks/new 页: 自动展开 dialog; 局部的校验/提交脚本已随 include 加载.
(function () {
  function open() {
    var d = document.getElementById('dlg-new');
    if (d && typeof d.showModal === 'function') d.showModal();
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', open);
  } else {
    open();
  }
})();
</script>
{% endblock %}
